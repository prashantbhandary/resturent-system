services:
  backend:
    build: ./backend
    container_name: restaurant-backend
    ports:
      - "${BACKEND_PORT:-5001}:5000"
    environment:
      PORT: 5000
      JWT_SECRET: dev-secret-change-me
      JWT_EXPIRES_IN: 7d
      DATABASE_PATH: /data/database.sqlite
      CORS_ORIGIN: http://localhost:3000
      TAX_RATE: "0.13"
      NODE_ENV: development
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
      - backend_data:/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: restaurant-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-5001}
      VITE_SOCKET_URL: http://localhost:${BACKEND_PORT:-5001}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_node_modules:
  frontend_node_modules:
  backend_data:
